spring:
  application:
    name: stockpilot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stockpilot}
    username: ${DB_USERNAME:stockpilot}
    password: ${DB_PASSWORD:stockpilot}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-dev-secret-that-is-at-least-256-bits-long-000}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  inventory:
    stock-policy: ${APP_INVENTORY_STOCK_POLICY:WARN}
  default-zone: ${APP_DEFAULT_ZONE:Asia/Kolkata}
  storage:
    import-reports-dir: ${APP_IMPORT_REPORTS_DIR:./data/import-reports}
  otp:
    ttl-minutes: 10
    resend-cooldown-seconds: 60
    max-per-hour: 5

brevo:
  api-key: ${BREVO_API_KEY:}
  sender-email: ${BREVO_SENDER_EMAIL:no-reply@stockpilot.local}
  sender-name: ${BREVO_SENDER_NAME:StockPilot}
  base-url: https://api.brevo.com/v3

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.stockpilot: INFO
    org.flywaydb: INFO

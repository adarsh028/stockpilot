services:
  postgres:
    image: postgres:16
    container_name: stockpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockpilot}
      POSTGRES_USER: ${POSTGRES_USER:-stockpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stockpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockpilot} -d ${POSTGRES_DB:-stockpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: stockpilot-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@stockpilot.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  stockpilot-postgres-data:
